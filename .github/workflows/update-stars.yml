name: Update Agent GitHub Stars

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  update-stars:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch star counts and update manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eo pipefail

          MANIFEST="manifest.json"
          TODAY=$(date -u +%Y-%m-%d)
          CHANGED=false

          # Extract agent keys and their repos from manifest
          for agent in $(jq -r '.agents | keys[]' "$MANIFEST"); do
            repo=$(jq -r ".agents[\"$agent\"].repo // empty" "$MANIFEST")
            if [ -z "$repo" ]; then
              echo "Skipping $agent (no repo field)"
              continue
            fi

            echo "Fetching stars for $agent ($repo)..."
            stars=$(gh api "repos/$repo" --jq '.stargazers_count' 2>/dev/null || echo "")

            if [ -z "$stars" ] || [ "$stars" = "null" ]; then
              echo "  Warning: Could not fetch stars for $repo, skipping"
              continue
            fi

            old_stars=$(jq -r ".agents[\"$agent\"].github_stars // 0" "$MANIFEST")
            if [ "$stars" != "$old_stars" ]; then
              echo "  $agent: $old_stars → $stars"
              CHANGED=true
            else
              echo "  $agent: $stars (unchanged)"
            fi

            # Update both github_stars and stars_updated
            jq --arg agent "$agent" \
               --argjson stars "$stars" \
               --arg date "$TODAY" \
               '.agents[$agent].github_stars = $stars | .agents[$agent].stars_updated = $date' \
               "$MANIFEST" > tmp_manifest.json && mv tmp_manifest.json "$MANIFEST"
          done

          if [ "$CHANGED" = "true" ]; then
            echo "STARS_CHANGED=true" >> "$GITHUB_ENV"
          else
            echo "No star counts changed"
          fi

      - name: Commit and push
        if: env.STARS_CHANGED == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "chore: update agent GitHub star counts"
          git push
